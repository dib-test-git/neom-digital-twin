name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint-test:
    name: Python (services/*)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, anomaly-detection, pod-adapter]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install deps
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: ruff check .

      - name: Test
        working-directory: services/${{ matrix.service }}
        run: pytest -q || echo "no tests yet"

  web-build:
    name: Operator console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/operator-console/package-lock.json

      - name: Install
        working-directory: web/operator-console
        run: npm ci || npm install

      - name: Lint
        working-directory: web/operator-console
        run: npm run lint --if-present

      - name: Build
        working-directory: web/operator-console
        run: npm run build --if-present

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: terraform fmt
        working-directory: infra
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        working-directory: infra
        run: terraform init -backend=false
      - name: terraform validate
        working-directory: infra
        run: terraform validate
